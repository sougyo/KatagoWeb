<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KataGo 囲碁</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== Board List View ===== -->
  <div id="view-list" class="view">
    <header class="list-header">
      <h1>KataGo 囲碁</h1>
      <div class="header-buttons">
        <button id="btn-new-board" class="btn btn-primary">＋ 新しい対局</button>
        <button id="btn-new-record" class="btn btn-secondary">＋ 棋譜解析</button>
      </div>
    </header>
    <main id="board-grid" class="board-grid">
      <!-- Board cards injected by JS -->
    </main>
  </div>

  <!-- ===== Game View ===== -->
  <div id="view-game" class="view hidden">
    <header class="game-header">
      <button id="btn-back" class="btn btn-ghost btn-sm">← 戻る</button>
      <h2 id="game-title" class="game-title">対局</h2>
      <div id="game-status" class="game-status"></div>
    </header>
    <div class="game-body">
      <!-- Board -->
      <div id="board-wrap" class="board-wrap">
        <div id="board-container" class="board-container">
          <!-- SVG injected by JS -->
        </div>
      </div>
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-info">
          <div id="move-count" class="move-count">0 手目</div>
          <div id="komi-label" class="komi-label"></div>
        </div>
        <div class="sidebar-controls">
          <button id="btn-pass"    class="btn btn-warning" disabled>パス</button>
          <button id="btn-resign"  class="btn btn-danger"  disabled>投了</button>
          <button id="btn-analyze" class="btn btn-analyze" hidden>分析</button>
        </div>

        <!-- Analysis info panel (visible only in analysis mode) -->
        <div id="analysis-panel" class="analysis-panel hidden">
          <div class="wr-label">勝率（黒）</div>
          <div class="wr-bar-wrap">
            <div id="wr-black" class="wr-segment wr-b" style="width:50%"></div>
            <div id="wr-white" class="wr-segment wr-w" style="width:50%"></div>
          </div>
          <div id="wr-text"    class="wr-text">黒 50.0% / 白 50.0%</div>
          <div id="score-text" class="score-text"></div>
        </div>

        <!-- Win-rate graph -->
        <div id="winrate-graph-wrap" class="wr-graph-wrap hidden"></div>

        <div class="sidebar-history">
          <div class="history-header">棋譜</div>
          <div id="move-list" class="move-list"></div>
        </div>
      </aside>
    </div>
  </div>

  <!-- ===== Record View ===== -->
  <div id="view-record" class="view hidden">
    <header class="game-header">
      <button id="btn-rec-back" class="btn btn-ghost btn-sm">← 戻る</button>
      <h2 id="rec-title" class="game-title">棋譜解析</h2>
      <div id="rec-status" class="game-status"></div>
    </header>
    <div class="game-body">
      <div id="rec-board-wrap" class="board-wrap">
        <div id="rec-board-container" class="board-container"></div>
      </div>
      <aside class="sidebar">
        <div class="sidebar-info">
          <div id="rec-move-info" class="move-count">第 0 手</div>
          <div id="rec-players" class="rec-players"></div>
          <div id="rec-komi-row" class="rec-komi-row">
            <span id="rec-komi-label" class="komi-label"></span>
            <button id="btn-rec-edit-komi" class="btn-icon" title="コミを変更">✏</button>
          </div>
          <div id="rec-komi-edit" class="rec-komi-edit hidden">
            <input id="rec-komi-input" type="number" step="0.5">
            <button id="btn-rec-komi-save" class="btn btn-sm btn-primary">保存</button>
            <button id="btn-rec-komi-cancel" class="btn btn-sm btn-ghost">×</button>
          </div>
        </div>
        <div class="sidebar-controls nav-controls">
          <button id="btn-rec-first" class="btn btn-ghost btn-sm btn-nav" title="最初">⏮</button>
          <button id="btn-rec-prev"  class="btn btn-ghost btn-sm btn-nav" title="前へ">◀</button>
          <button id="btn-rec-next"  class="btn btn-ghost btn-sm btn-nav" title="次へ">▶</button>
          <button id="btn-rec-last"  class="btn btn-ghost btn-sm btn-nav" title="最後">⏭</button>
        </div>
        <div class="sidebar-controls">
          <button id="btn-rec-pass"    class="btn btn-warning" style="display:none">パス</button>
          <button id="btn-rec-analyze" class="btn btn-analyze">分析</button>
        </div>
        <div id="rec-analysis-panel" class="analysis-panel hidden">
          <div class="wr-label">勝率（黒）</div>
          <div class="wr-bar-wrap">
            <div id="rec-wr-black" class="wr-segment wr-b" style="width:50%"></div>
            <div id="rec-wr-white" class="wr-segment wr-w" style="width:50%"></div>
          </div>
          <div id="rec-wr-text"    class="wr-text">黒 50.0% / 白 50.0%</div>
          <div id="rec-score-text" class="score-text"></div>
        </div>

        <!-- Win-rate graph -->
        <div id="rec-winrate-graph-wrap" class="wr-graph-wrap hidden"></div>

        <div class="sidebar-history">
          <div class="history-header">棋譜ツリー</div>
          <div id="rec-move-tree" class="move-list"></div>
        </div>
      </aside>
    </div>
  </div>

  <!-- ===== New Board Modal ===== -->
  <div id="modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-dialog">
      <h2 class="modal-title">新しい対局</h2>
      <form id="form-new-board" autocomplete="off">
        <div class="form-row">
          <label for="input-name">対局名</label>
          <input id="input-name" type="text" maxlength="50" placeholder="対局 1">
        </div>
        <div class="form-row">
          <label for="input-size">碁盤サイズ</label>
          <select id="input-size">
            <option value="19" selected>19 × 19</option>
            <option value="13">13 × 13</option>
            <option value="9">9 × 9</option>
          </select>
        </div>
        <div class="form-row">
          <label for="input-handicap">置き石 (0〜9)</label>
          <input id="input-handicap" type="number" min="0" max="9" value="0">
        </div>
        <p class="form-note">※ あなたが黒番（ハンデあり）、KataGo が白番です</p>
        <div class="form-actions">
          <button type="button" id="btn-cancel-modal" class="btn btn-ghost">キャンセル</button>
          <button type="submit" class="btn btn-primary">対局開始</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== New Record Modal ===== -->
  <div id="modal-record" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-dialog">
      <h2 class="modal-title">棋譜解析</h2>
      <div class="tab-buttons">
        <button class="tab-btn active" data-tab="tab-sgf">SGF 読み込み</button>
        <button class="tab-btn" data-tab="tab-manual">手入力</button>
      </div>

      <div id="tab-sgf" class="tab-panel">
        <form id="form-new-record-sgf" autocomplete="off">
          <div class="form-row">
            <label for="rec-input-name-sgf">棋譜名</label>
            <input id="rec-input-name-sgf" type="text" maxlength="50" placeholder="棋譜 1">
          </div>
          <div class="form-row">
            <label for="rec-input-file">SGF ファイル</label>
            <input id="rec-input-file" type="file" accept=".sgf">
          </div>
          <div class="form-row">
            <label for="rec-input-sgf">または SGF テキスト</label>
            <textarea id="rec-input-sgf" rows="5" style="resize:vertical;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-family:monospace;font-size:.82rem;width:100%" placeholder="(;GM[1]SZ[19]..."></textarea>
          </div>
          <div class="form-row">
            <label>対局者</label>
            <div class="sgf-players">
              <span>● <span id="rec-sgf-pb">—</span></span>
              <span>○ <span id="rec-sgf-pw">—</span></span>
            </div>
          </div>
          <div class="form-row">
            <label for="rec-sgf-komi">コミ</label>
            <input id="rec-sgf-komi" type="number" step="0.5" value="6.5">
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-ghost" id="btn-cancel-record-sgf">キャンセル</button>
            <button type="submit" class="btn btn-primary">作成</button>
          </div>
        </form>
      </div>

      <div id="tab-manual" class="tab-panel hidden">
        <form id="form-new-record-manual" autocomplete="off">
          <div class="form-row">
            <label for="rec-input-name-manual">棋譜名</label>
            <input id="rec-input-name-manual" type="text" maxlength="50" placeholder="棋譜 1">
          </div>
          <div class="form-row">
            <label for="rec-input-size">碁盤サイズ</label>
            <select id="rec-input-size">
              <option value="19" selected>19 × 19</option>
              <option value="13">13 × 13</option>
              <option value="9">9 × 9</option>
            </select>
          </div>
          <div class="form-row">
            <label for="rec-input-komi">コミ</label>
            <input id="rec-input-komi" type="number" step="0.5" value="6.5">
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-ghost" id="btn-cancel-record-manual">キャンセル</button>
            <button type="submit" class="btn btn-primary">作成</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== Loading Overlay (board creation) ===== -->
  <div id="loading-overlay" class="modal-overlay hidden">
    <div class="loading-dialog">
      <div class="spinner"></div>
      <p>KataGo を起動中…</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
